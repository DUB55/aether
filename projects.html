<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DUB5 - Projects</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root{
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
      --ease:cubic-bezier(.4,0,.2,1);
      --g1:#ec4899;--g2:#8b5cf6;--g3:#3b82f6;
      --bg:#0c0c0e;--bg2:#141416;--bg3:#1a1a1d;
      --t:#fff;--t2:rgba(255,255,255,.78);--t3:rgba(255,255,255,.45);
      --bdr:rgba(255,255,255,.10);--bdr2:rgba(255,255,255,.18);
    }
    html,body{height:100%;margin:0;font-family:var(--font);background:var(--bg);color:var(--t);display:flex;flex-direction:column}
    *{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--t3) transparent}
    a{color:inherit;text-decoration:none}
    .proj-hdr{height:56px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0}
    .brand{display:flex;align-items:center;gap:10px;color:#fff;user-select:none}
    .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
    .brand-name{font-size:15px;font-weight:700}
    .proj-title{flex:1;font-size:15px;font-weight:600}
    .nav-btn{border:1px solid rgba(255,255,255,.15);background:transparent;color:#fff;cursor:pointer;border-radius:9px;font-size:12px;padding:7px 10px;display:flex;align-items:center;gap:6px}
    .nav-btn:hover{border-color:var(--bdr2)}
    .nav-btn svg{width:14px;height:14px}
    .proj-body{flex:1;overflow:auto;padding:20px}
    .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .proj-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;transition:transform .15s,border-color .15s;cursor:pointer}
    .proj-card:hover{transform:translateY(-2px);border-color:var(--bdr2)}
    .proj-thumb{height:140px;background:var(--bg3);border-bottom:1px solid var(--bdr);overflow:hidden;display:flex;align-items:stretch;justify-content:stretch}
    .proj-thumb iframe{width:100%;height:100%;border:0;pointer-events:none;background:#fff}
    .proj-meta{padding:12px;display:flex;flex-direction:column;gap:6px}
    .proj-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .proj-sub,.proj-stats{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--t3)}
    .proj-stats{display:flex;gap:10px;flex-wrap:wrap}
    .proj-actions{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
    .proj-act{flex:1;justify-content:center;border:1px solid rgba(255,255,255,.15);background:#0a0a0a;color:#fff;cursor:pointer;border-radius:9px;font-size:12px;padding:7px 10px;display:flex;align-items:center;gap:6px}
    .proj-act:hover{border-color:var(--bdr2)}
    .proj-act svg{width:14px;height:14px}
    .proj-act.danger{border-color:rgba(239,68,68,.35);color:#fecaca}
    .proj-empty{display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--t3);padding:60px 0}
    .proj-empty svg{width:18px;height:18px}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);z-index:400;display:none;align-items:center;justify-content:center}
    .modal-bg.on{display:flex}
    .modal{width:min(520px,92vw);background:#0a0a0a;border:1px solid #1f1f1f;border-radius:12px;padding:14px;color:#fff}
    .modal h3{font-size:16px;margin-bottom:8px}
    .modal p{font-size:12.5px;color:#cbd5e1;margin-bottom:10px}
    .modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
    .btn{border:1px solid rgba(255,255,255,.15);background:#0a0a0a;color:#fff;cursor:pointer;border-radius:9px;font-size:12px;padding:7px 10px;display:flex;align-items:center;gap:6px}
    .btn:hover{border-color:var(--bdr2)}
    #toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast{background:#141416;border:1px solid #2a2a2a;color:#fff;padding:7px 12px;border-radius:999px;font-size:12.5px}
    @media(max-width:640px){.proj-grid{grid-template-columns:1fr}.proj-thumb{height:160px}}
  </style>
</head>
<body>
  <div class="proj-hdr">
    <a class="brand" href="index.html">
      <div class="logo">D5</div><div class="brand-name">DUB5</div>
    </a>
    <div class="proj-title">My Projects</div>
    <button class="nav-btn" onclick="triggerImport()"><svg data-lucide="upload"></svg> Import</button>
    <button class="nav-btn" onclick="newProject()"><svg data-lucide="plus"></svg> New</button>
  </div>
  <div class="proj-body">
    <div id="proj-grid" class="proj-grid"></div>
    <div id="proj-empty" class="proj-empty">
      <div style="display:flex;align-items:center;gap:8px"><svg data-lucide="folder"></svg><span>Nothing here yet</span></div>
      <div style="font-size:14px;color:#ddd">No projects yet</div>
      <div style="font-size:12.5px;color:#999">Start building something amazing</div>
    </div>
  </div>

  <div id="dialog-bg" class="modal-bg">
    <div class="modal">
      <h3 id="dialog-title">Message</h3>
      <p id="dialog-msg">...</p>
      <div id="dialog-extra"></div>
      <div class="modal-acts">
        <button class="btn" id="dialog-cancel">Cancel</button>
        <button class="btn" id="dialog-ok">OK</button>
      </div>
    </div>
  </div>

  <div id="toasts"></div>
  <input id="import-input" type="file" accept="application/json,.json" style="display:none"/>

  <script>
    let projects = JSON.parse(localStorage.getItem('dub5-projects')||'[]');

    function escapeHTML(v){return(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function escapeAttr(v){return escapeHTML(v).replace(/'/g,'&#39;');}
    function formatTime(v){return new Date(v).toLocaleString();}
    function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),2400);}

    function withDefaults(p){
      return{id:p.id,name:p.name||'Untitled project',sessionId:p.sessionId||`dub5-${Math.random().toString(36).slice(2,10)}`,html:p.html||'',files:Array.isArray(p.files)&&p.files.length?p.files:[{name:'index.html',content:p.html||''}],chat:Array.isArray(p.chat)?p.chat:[],notes:Array.isArray(p.notes)?p.notes:[],snapshots:Array.isArray(p.snapshots)?p.snapshots:[],updatedAt:p.updatedAt||Date.now(),lastOpened:p.lastOpened||Date.now()};
    }

    projects = projects.map(withDefaults);

    function persist(){localStorage.setItem('dub5-projects',JSON.stringify(projects));}

    function renderProjects(){
      const grid=document.getElementById('proj-grid');
      const empty=document.getElementById('proj-empty');
      if(!projects.length){grid.innerHTML='';empty.style.display='flex';return;}
      empty.style.display='none';
      const ordered=[...projects].sort((a,b)=>(b.lastOpened||0)-(a.lastOpened||0));
      grid.innerHTML=ordered.map(p=>{
        const thumb=p.html
          ?`<iframe sandbox="allow-scripts" srcdoc="${escapeAttr(p.html)}"></iframe>`
          :`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px;gap:8px"><svg data-lucide="file" width="16" height="16"></svg>No preview</div>`;
        return`<div class="proj-card" onclick="openProject('${p.id}')">
          <div class="proj-thumb">${thumb}</div>
          <div class="proj-meta">
            <div class="proj-name" title="${escapeHTML(p.name)}">${escapeHTML(p.name)}</div>
            <div class="proj-sub">Last opened: ${escapeHTML(formatTime(p.lastOpened||p.updatedAt||Date.now()))}</div>
            <div class="proj-stats"><span>Updated ${escapeHTML(formatTime(p.updatedAt||Date.now()))}</span><span>${p.files.length} files</span></div>
            <div class="proj-actions" onclick="event.stopPropagation()">
              <button class="proj-act" onclick="openProject('${p.id}')"><svg data-lucide="play"></svg>Open</button>
              <button class="proj-act" onclick="dupProject('${p.id}')"><svg data-lucide="copy"></svg>Duplicate</button>
              <button class="proj-act" onclick="exportProject('${p.id}')"><svg data-lucide="download"></svg>Export</button>
              <button class="proj-act danger" onclick="deleteProject('${p.id}')"><svg data-lucide="trash-2"></svg>Delete</button>
            </div>
          </div>
        </div>`;
      }).join('');
      try{window.lucide?.createIcons();}catch(e){}
    }

    function openProject(id){
      const p=projects.find(x=>x.id===id);
      if(!p)return;
      p.lastOpened=Date.now();
      persist();
      sessionStorage.setItem('dub5-open-project',id);
      sessionStorage.removeItem('dub5-start-prompt');
      location.href='editor.html';
    }

    function newProject(){
      sessionStorage.removeItem('dub5-open-project');
      sessionStorage.removeItem('dub5-start-prompt');
      location.href='editor.html';
    }

    function dupProject(id){
      const p=projects.find(x=>x.id===id);
      if(!p)return;
      const copy=withDefaults({...JSON.parse(JSON.stringify(p)),id:`proj-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,name:`${p.name} Copy`,updatedAt:Date.now(),lastOpened:Date.now()});
      projects.unshift(copy);persist();renderProjects();toast('Duplicated');
    }

    function exportProject(id){
      const p=projects.find(x=>x.id===id);
      if(!p)return;
      const name=(p.name||'dub5-project').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-_.]/g,'');
      const url=URL.createObjectURL(new Blob([JSON.stringify(p,null,2)],{type:'application/json'}));
      const a=document.createElement('a');a.href=url;a.download=`${name}.json`;document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),10000);
      toast('Exported');
    }

    async function deleteProject(id){
      if(!(await confirmBox('Delete this project? This cannot be undone.')))return;
      projects=projects.filter(x=>x.id!==id);
      persist();renderProjects();toast('Deleted');
    }

    function triggerImport(){document.getElementById('import-input').click();}

    document.getElementById('import-input').addEventListener('change',e=>{
      const file=e.target.files?.[0];if(!file)return;
      file.text().then(t=>JSON.parse(t)).then(data=>{
        const imported=withDefaults({...data,id:`proj-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,name:data.name||file.name.replace(/\.json$/i,''),updatedAt:Date.now(),lastOpened:Date.now()});
        projects.unshift(imported);persist();renderProjects();toast('Imported');
      }).catch(()=>alert('That file does not look like a DUB5 project.')).finally(()=>{e.target.value='';});
    });

    function dialog(title,msg,{input=false,okText='OK',cancelText='Cancel',value=''}={}){
      return new Promise(resolve=>{
        const bg=document.getElementById('dialog-bg');
        document.getElementById('dialog-title').textContent=title;
        document.getElementById('dialog-msg').textContent=msg;
        const extra=document.getElementById('dialog-extra');extra.innerHTML='';
        let inp=null;
        if(input){inp=document.createElement('input');inp.type='text';inp.value=value;inp.style.cssText='width:100%;background:#000;border:1px solid #1f1f1f;border-radius:8px;color:#fff;padding:8px 10px;font-size:12px;outline:none;margin-top:6px';extra.appendChild(inp);setTimeout(()=>inp.focus(),10);}
        const ok=document.getElementById('dialog-ok');const cancel=document.getElementById('dialog-cancel');
        ok.textContent=okText;cancel.textContent=cancelText;
        const close=()=>{bg.classList.remove('on');ok.onclick=null;cancel.onclick=null;};
        ok.onclick=()=>{close();resolve(input?inp.value:true);};
        cancel.onclick=()=>{close();resolve(null);};
        bg.classList.add('on');
      });
    }
    function confirmBox(msg){return dialog('Confirm',msg,{okText:'Yes',cancelText:'No'}).then(v=>v!==null);}

    renderProjects();
    try{window.lucide?.createIcons();}catch(e){}
  </script>
</body>
</html>
