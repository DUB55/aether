<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aether - AI Development Platform</title>  
    <style>
        html, body, iframe {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            z-index: 1000;
        }
        
        .footer a {
            color: #4CAF50;
            text-decoration: none;
            margin: 0 10px;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .verification-meta {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Firebase Verification Meta Tags -->
    <meta name="google-site-verification" content="your-verification-code-here" class="verification-meta">
    <meta name="firebase-verification" content="aether-89251" class="verification-meta">
    
    <iframe id="aether-frame" src="" width="100%" height="100%" style="border: none;"></iframe>
    
    <!-- Footer with Privacy Policy Link -->
    <div class="footer">
        <a href="?page=privacy-policy" target="_blank">Privacy Policy</a>
        <a href="?page=terms-of-service" target="_blank">Terms of Service</a>
        <span>© 2024 Aether</span>
    </div>

    <script>
        class SimpleIframeRouter {
            constructor() {
                this.baseUrl = 'https://aether-vert.vercel.app';
                this.defaultPage = 'home';
                this.init();
            }

            init() {
                this.handleRoute();
                window.addEventListener('popstate', () => this.handleRoute());
                
                // Add domain verification for Firebase
                this.addVerificationElements();
            }

            addVerificationElements() {
                // Add Firebase verification link (hidden but accessible)
                const verificationLink = document.createElement('a');
                verificationLink.href = '?page=privacy-policy';
                verificationLink.textContent = 'Privacy Policy';
                verificationLink.style.display = 'none';
                verificationLink.id = 'firebase-privacy-link';
                document.body.appendChild(verificationLink);
                
                // Add meta tag for domain ownership
                const metaTag = document.createElement('meta');
                metaTag.name = 'firebase-app-id';
                metaTag.content = 'aether-89251';
                document.head.appendChild(metaTag);
            }

            getCurrentPage() {
                const params = new URLSearchParams(window.location.search);
                const page = params.get('page') || this.defaultPage;
                
                const routeMap = {
                    'home': '',
                    'projects': '#/projects',
                    'templates': '#/templates',
                    'community': '#/community',
                    'pricing': '#/pricing',
                    'docs': '#/docs',
                    'privacy-policy': '#/privacy-policy',
                    'terms-of-service': '#/terms-of-service'
                };
                
                return {
                    page: page,
                    route: routeMap[page] || ''
                };
            }

            handleRoute() {
                const { page, route } = this.getCurrentPage();
                const iframeSrc = `${this.baseUrl}/${route}`;
                
                const iframe = document.getElementById('aether-frame');
                iframe.src = iframeSrc;
                
                const newUrl = page === this.defaultPage ? 
                    window.location.pathname : 
                    `${window.location.pathname}?page=${page}`;
                
                if (window.location.search !== `?page=${page}`) {
                    history.pushState({ page }, '', newUrl);
                }
                
                // Update footer visibility for legal pages
                this.updateFooterVisibility(page);
            }
            
            updateFooterVisibility(page) {
                const footer = document.querySelector('.footer');
                if (page === 'privacy-policy' || page === 'terms-of-service') {
                    footer.style.display = 'none';
                } else {
                    footer.style.display = 'block';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.simpleRouter = new SimpleIframeRouter();
        });
    </script>
</body>
</html>
